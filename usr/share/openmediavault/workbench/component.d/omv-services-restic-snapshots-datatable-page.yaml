version: "1.0"
type: component
data:
  name: omv-services-restic-snapshots-datatable-page
  type: datatablePage
  config:
    autoReload: false
    hasSearchField: true
    stateId: c3b6be8f-f71e-4bc7-84af-40a1902b4096
    sorters:
      - dir: asc
        prop: name
    store:
      proxy:
        service: Restic
        get:
          method: getSnapshotList
    columns:
      - name: _("Enabled")
        prop: enable
        flexGrow: 1
        sortable: true
        cellTemplateName: checkIcon
      - name: _("Name")
        prop: name
        flexGrow: 1
        sortable: true
      - name: _("Repository")
        prop: reponame
        flexGrow: 1
        sortable: true
      - name: _("Source folders")
        prop: sourcename
        flexGrow: 2
        sortable: true
      - name: _("Tags")
        prop: tags
        flexGrow: 1
        sortable: true
      - name: _("Last snapshot")
        prop: hash
        flexGrow: 1
        sortable: false
      - name: _("Schedule")
        prop: schedule
        flexGrow: 2
        sortable: true
        cellTemplateName: template
        cellTemplateConfig: "{{ schedule | cron2human }}"
    actions:
      - template: create
        execute:
          type: url
          url: "/services/restic/snapshots/create"
      - template: edit
        execute:
          type: url
          url: "/services/restic/snapshots/edit/{{ _selected[0].uuid }}"
      - type: iconButton
        icon: mdi:play
        tooltip: _("Run backup now")
        execute:
          type: taskDialog
          taskDialog:
            config:
              title: _("Running backup job ...")
              startOnInit: true
              request:
                service: Restic
                method: runSnapshot
                params:
                  uuid: "{{ _selected[0].uuid }}"
        enabledConstraints:
          minSelected: 1
          maxSelected: 1
      - template: delete
        execute:
          type: request
          request:
            service: Restic
            method: deleteSnapshot
            params:
              uuid: "{{ _selected[0].uuid }}"
