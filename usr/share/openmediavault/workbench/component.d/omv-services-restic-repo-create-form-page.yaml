version: "1.0"
type: component
data:
  name: omv-services-restic-repo-create-form-page
  type: formPage
  config:
    request:
      service: Restic
      get:
        method: getRepo
        params:
          uuid: "{{ _routeParams.uuid }}"
      post:
        method: setRepo
    fields:
      - type: confObjUuid
      - type: textInput
        name: name
        label: _("Repository name")
        validators:
          required: true
          patternType: 'shareName'
      - type: passwordInput
        name: passphrase
        label: _("Passphrase")
        hint: _("Ensure that the passphrase is strong and stored securely. It cannot be recovered if lost.")
        validators:
          required: true
      - type: select
        name: type
        label: _("Type")
        value: "local"
        store:
          data:
            - ["local", _("Local (shared folder)")]
            - ["s3", _("S3 compatible")]
            - ["sftp", _("SFTP")]
            - ["b2", _("Backblaze B2 (native API)")]
            - ["rest", _("REST server")]
      - type: sharedFolderSelect
        name: sharedfolderref
        label: _("Shared Folder")
        hint: _("The shared folder used as the restic repository location.")
        value: ""
        modifiers:
          - type: hidden
            constraint:
              operator: ne
              arg0:
                prop: type
              arg1: "local"
      - type: textInput
        name: uri
        label: _("Remote path / URI")
        value: ""
        hint: '_("S3 (AWS): bucket-name · S3 (custom endpoint): https://host/bucket or https://host:port/bucket · SFTP: user@host:/path · B2: bucket-name · REST: http://host:8000/repo")'
        modifiers:
          - type: hidden
            constraint:
              operator: eq
              arg0:
                prop: type
              arg1: "local"
      - type: textInput
        name: accesskey
        label: _("Account ID / Access key")
        value: ""
        hint: '_("S3: Access key ID · B2: Account ID")'
        modifiers:
          - type: hidden
            constraint:
              operator: in
              arg0:
                prop: type
              arg1: ["local", "sftp", "rest"]
      - type: passwordInput
        name: secretkey
        label: _("Account key / Secret key")
        value: ""
        hint: '_("S3: Secret access key · B2: Application key")'
        modifiers:
          - type: hidden
            constraint:
              operator: in
              arg0:
                prop: type
              arg1: ["local", "sftp", "rest"]
      - type: checkbox
        name: skipinit
        label: _("Skip initialisation")
        value: false
        hint: _("Tick this to import an existing restic repository. The passphrase must match the one already used by that repository.")
    buttons:
      - template: submit
        execute:
          type: url
          url: "/services/restic/repos"
      - template: cancel
        execute:
          type: url
          url: "/services/restic/repos"
